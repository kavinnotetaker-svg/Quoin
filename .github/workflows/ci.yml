name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: quoin
          POSTGRES_PASSWORD: quoin
          POSTGRES_DB: quoin_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://quoin:quoin@localhost:5432/quoin_test
      CLERK_SECRET_KEY: sk_test_placeholder
      CLERK_WEBHOOK_SECRET: whsec_test_placeholder
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_test_placeholder

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit and integration tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Docker build
        run: docker build -t quoin:test .

      - name: Run evals
        run: npm run eval
